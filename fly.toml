app = "flet-controls-gallery"

[build]
  dockerfile = "Dockerfile"

[env]
  FLET_SERVER_PORT = "8080"
  FLET_FORCE_WEB_SERVER = "true"
  MEM_DIAG = "1"
  MEM_DIAG_INTERVAL_SEC = "60"
  MEM_DIAG_TRACE_INTERVAL_SEC = "600"
  MEM_DIAG_TRACE_FRAMES = "10"
  MEM_DIAG_TRACE_TOP = "20"
  MEM_DIAG_CONTROL_SCAN_MAX_NODES = "10000"
  MEM_DIAG_COLLECT_ON_SAMPLE = "0"
  MEM_DIAG_TYPE_HIST = "1"
  MEM_DIAG_TYPE_HIST_INTERVAL_SEC = "900"
  MEM_DIAG_TYPE_HIST_TOP = "30"

[experimental]
  allowed_public_ports = []
  auto_rollback = true

[[services]]
  http_checks = []
  internal_port = 8080
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 250
    soft_limit = 200
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"
